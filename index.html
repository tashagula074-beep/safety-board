<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Safety Counter</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        transition: background-color 0.5s ease;
        position: relative;
    }

    .container {
        width: 100%;
        padding: 20px;
        z-index: 2;
    }

    /* 🔥 LOGO STYLING */
    .logo {
    	position: absolute;
    	bottom: 20px;
    	right: 30px;
    	height: 120px;
    }

    h1 {
        font-size: 64px;
        margin: 140px 0 20px 0;
        letter-spacing: 2px;
    }

    .days {
        font-size: 220px;
        font-weight: bold;
    }

    .subtext {
        font-size: 54px;
        margin-top: 10px;
        font-weight: bold;
    }

    .info {
        margin-top: 40px;
        font-size: 36px;
        font-weight: bold;
    }

    .milestone {
        margin-top: 24px;
        font-size: 48px;
        font-weight: bold;
        display: none;
    }

    #confettiCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }
</style>
</head>

<body>



<canvas id="confettiCanvas"></canvas>

<div class="container">
    <h1>SAFETY RECORD</h1>
    <div class="days" id="days">0</div>
    <div class="subtext">DAYS SINCE LAST INCIDENT</div>

    <div class="info">
        <div id="lastIncident"></div>
        <div id="bestStreak"></div>
    </div>

    <div class="milestone" id="milestoneMessage">
        🎉 100+ DAYS ACCIDENT FREE! 🎉
    </div>
</div>

<script>
    const incidentDateString = "2026-01-01";
    const bestStreakDays = 126;

    function parseLocalDate(dateString) {
        const [y, m, d] = dateString.split("-").map(Number);
        return new Date(y, m - 1, d);
    }

    function formatDate(date) {
        return date.toLocaleDateString("en-US", {
            month: "long",
            day: "numeric",
            year: "numeric"
        });
    }

    const incidentDate = parseLocalDate(incidentDateString);
    const today = new Date();
    const todayLocal = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    let diffDays = Math.floor((todayLocal - incidentDate) / (1000 * 60 * 60 * 24));
    if (diffDays < 0) diffDays = 0;

    document.getElementById("days").innerText = diffDays;
    document.getElementById("lastIncident").innerText =
        "Last Incident Date: " + formatDate(incidentDate);
    document.getElementById("bestStreak").innerText =
        "Best Streak: " + bestStreakDays + " Days";

    // COLOR LOGIC
    if (diffDays <= 10) {
        document.body.style.backgroundColor = "#8b0000";
    } else if (diffDays <= 50) {
        document.body.style.backgroundColor = "#f9a825";
        document.body.style.color = "black";
    } else if (diffDays <= 100) {
        document.body.style.backgroundColor = "#2e7d32";
    } else {
        document.body.style.backgroundColor = "#00c853";
    }

    if (diffDays >= 100) {
        document.getElementById("milestoneMessage").style.display = "block";
    }

    // CONFETTI (same as before)
    const canvas = document.getElementById("confettiCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const pieces = [];
    const colors = ["#ffffff", "#ffd54f", "#ff5252", "#69f0ae", "#40c4ff"];

    function createPiece() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * -canvas.height,
            w: 8 + Math.random() * 10,
            h: 8 + Math.random() * 14,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: 2 + Math.random() * 4,
            drift: -1 + Math.random() * 2,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: -0.1 + Math.random() * 0.2
        };
    }

    function initConfetti(n = 175) {
        for (let i = 0; i < n; i++) pieces.push(createPiece());
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of pieces) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();

            p.y += p.speed;
            p.x += p.drift;
            p.rot += p.rotSpeed;

            if (p.y > canvas.height) {
                p.y = -10;
                p.x = Math.random() * canvas.width;
            }
        }
    }

    function animate() {
        if (diffDays >= 100) draw();
        requestAnimationFrame(animate);
    }

    if (diffDays >= 100) initConfetti();
    animate();
</script>

</body>
</html>
